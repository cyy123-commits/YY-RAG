<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识库文件导入 — 逸云智库</title>
    <style>
        :root {
            --bg: #06080d;
            --panel: rgba(10, 14, 23, 0.92);
            --text: #dce4f0;
            --text-secondary: #a0b4cc;
            --muted: #5a6e88;
            --accent: #00d4ff;
            --accent2: #7c3aed;
            --accent3: #f01b7d;
            --border: rgba(0, 180, 255, 0.15);
            --border-glow: rgba(0, 200, 255, 0.35);
            --font-mono: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', 'SF Mono', 'Consolas', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Inter", "Segoe UI", "Microsoft YaHei", system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0, 200, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 200, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridShift 20s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes gridShift {
            0% { transform: translate(0, 0); }
            100% { transform: translate(60px, 60px); }
        }

        /* Floating particles */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(2px 2px at 10% 15%, rgba(0, 212, 255, 0.45), transparent),
                radial-gradient(2px 2px at 85% 25%, rgba(124, 58, 237, 0.4), transparent),
                radial-gradient(1px 1px at 40% 70%, rgba(0, 212, 255, 0.5), transparent),
                radial-gradient(2px 2px at 70% 55%, rgba(240, 27, 125, 0.3), transparent),
                radial-gradient(1px 1px at 20% 80%, rgba(0, 212, 255, 0.35), transparent),
                radial-gradient(2px 2px at 55% 20%, rgba(124, 58, 237, 0.3), transparent);
            animation: particleFloat 15s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes particleFloat {
            0%, 100% { opacity: 0.6; transform: translateY(0); }
            33% { opacity: 1; transform: translateY(-8px); }
            66% { opacity: 0.4; transform: translateY(4px); }
        }

        /* ===== Main Container ===== */
        .container {
            width: 100%;
            max-width: 820px;
            background: var(--panel);
            padding: 32px;
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow:
                0 0 60px rgba(0, 180, 255, 0.06),
                0 0 120px rgba(0, 180, 255, 0.03),
                inset 0 1px 0 rgba(255, 255, 255, 0.03);
            position: relative;
            z-index: 1;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }

        /* Top accent line */
        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(0, 212, 255, 0.4) 25%,
                rgba(124, 58, 237, 0.5) 50%,
                rgba(0, 212, 255, 0.4) 75%,
                transparent 100%
            );
            border-radius: 20px 20px 0 0;
            animation: topLinePulse 3s ease-in-out infinite;
        }

        @keyframes topLinePulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* ===== Header ===== */
        .header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .logo-icon {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            box-shadow: 0 0 20px rgba(0, 200, 255, 0.4), 0 0 40px rgba(0, 180, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            animation: logoGlow 2.5s ease-in-out infinite;
            flex-shrink: 0;
        }

        @keyframes logoGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(0, 200, 255, 0.4), 0 0 40px rgba(0, 180, 255, 0.2); }
            50% { box-shadow: 0 0 30px rgba(0, 200, 255, 0.6), 0 0 60px rgba(0, 180, 255, 0.35); }
        }

        .header-text h1 {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #e0f0ff, #80d0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 0.5px;
            margin: 0;
        }

        .header-text span {
            font-size: 12px;
            color: var(--muted);
            font-family: var(--font-mono);
            letter-spacing: 0.3px;
        }

        .header-actions {
            margin-left: auto;
            display: flex;
            gap: 8px;
        }

        .btn-back {
            border: 1px solid rgba(0, 180, 255, 0.25);
            background: rgba(0, 180, 255, 0.06);
            color: var(--text-secondary);
            padding: 8px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 12px;
            font-family: var(--font-mono);
            letter-spacing: 0.3px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-back:hover {
            border-color: var(--accent);
            box-shadow: 0 0 16px rgba(0, 200, 255, 0.2);
            color: #fff;
        }

        /* ===== Upload Zone ===== */
        .upload-area {
            border: 2px dashed rgba(0, 200, 255, 0.25);
            border-radius: 16px;
            padding: 48px 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.35s ease;
            margin-bottom: 24px;
            background: rgba(0, 180, 255, 0.02);
            position: relative;
            overflow: hidden;
        }

        .upload-area::before {
            content: '';
            position: absolute;
            inset: -20px;
            background: radial-gradient(circle at center, rgba(0, 200, 255, 0.06), transparent 70%);
            opacity: 0;
            transition: opacity 0.35s;
        }

        .upload-area:hover {
            border-color: var(--accent);
            background: rgba(0, 200, 255, 0.05);
            box-shadow:
                inset 0 0 40px rgba(0, 200, 255, 0.04),
                0 0 40px rgba(0, 180, 255, 0.08);
            transform: translateY(-1px);
        }

        .upload-area:hover::before {
            opacity: 1;
        }

        .upload-area.drag-over {
            border-color: var(--accent);
            background: rgba(0, 200, 255, 0.08);
            box-shadow:
                0 0 60px rgba(0, 200, 255, 0.15),
                inset 0 0 60px rgba(0, 200, 255, 0.06);
            animation: uploadPulse 1.5s ease-in-out infinite;
        }

        @keyframes uploadPulse {
            0%, 100% { box-shadow: 0 0 40px rgba(0, 200, 255, 0.1); }
            50% { box-shadow: 0 0 60px rgba(0, 200, 255, 0.2); }
        }

        .upload-icon {
            font-size: 52px;
            margin-bottom: 14px;
            position: relative;
            z-index: 1;
            display: inline-block;
            animation: floatIcon 3s ease-in-out infinite;
        }

        @keyframes floatIcon {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .upload-text {
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 6px;
            position: relative;
            z-index: 1;
        }

        .upload-hint {
            font-size: 12px;
            color: var(--muted);
            font-family: var(--font-mono);
            letter-spacing: 0.3px;
            position: relative;
            z-index: 1;
        }

        .file-input {
            display: none;
        }

        /* ===== Buttons ===== */
        .btn {
            background: linear-gradient(135deg, rgba(0, 150, 255, 0.2), rgba(124, 58, 237, 0.2));
            color: #c0e8ff;
            border: 1px solid rgba(0, 180, 255, 0.3);
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            letter-spacing: 0.4px;
        }

        .btn:hover:not(:disabled) {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(0, 200, 255, 0.25);
            background: linear-gradient(135deg, rgba(0, 180, 255, 0.35), rgba(124, 58, 237, 0.3));
            color: #fff;
            transform: translateY(-1px);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            filter: grayscale(30%);
        }

        /* ===== File List ===== */
        .section-title {
            font-size: 13px;
            color: var(--muted);
            font-family: var(--font-mono);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, rgba(0, 200, 255, 0.15), transparent);
        }

        .file-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .file-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
            animation: fileSlideIn 0.4s ease-out;
            position: relative;
            overflow: hidden;
        }

        @keyframes fileSlideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .file-item:hover {
            border-color: rgba(0, 200, 255, 0.3);
            background: rgba(0, 180, 255, 0.03);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        /* Left accent bar on file item */
        .file-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 10px;
            bottom: 10px;
            width: 3px;
            border-radius: 0 3px 3px 0;
            background: rgba(0, 200, 255, 0.15);
            transition: all 0.3s;
        }

        .file-item.status-completed::before { background: rgba(0, 230, 118, 0.5); }
        .file-item.status-processing::before { background: rgba(0, 200, 255, 0.5); }
        .file-item.status-error::before { background: rgba(255, 60, 80, 0.5); }

        .file-info {
            display: flex;
            flex-direction: column;
            flex: 1;
            margin-right: 20px;
            min-width: 0;
        }

        .file-name {
            font-weight: 600;
            color: var(--text);
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-size {
            font-size: 11px;
            color: var(--muted);
            margin-top: 5px;
            font-family: var(--font-mono);
        }

        /* Status Badge */
        .status-badge {
            padding: 6px 14px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 600;
            color: white;
            min-width: 80px;
            text-align: center;
            letter-spacing: 0.4px;
            font-family: var(--font-mono);
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .status-uploading {
            background: rgba(255, 160, 30, 0.2);
            color: #ffb84d;
            border: 1px solid rgba(255, 160, 30, 0.3);
        }
        .status-processing {
            background: rgba(0, 180, 255, 0.2);
            color: #40d0ff;
            border: 1px solid rgba(0, 180, 255, 0.3);
        }
        .status-completed {
            background: rgba(0, 230, 118, 0.2);
            color: #34e88a;
            border: 1px solid rgba(0, 230, 118, 0.3);
        }
        .status-error {
            background: rgba(255, 60, 80, 0.2);
            color: #ff6070;
            border: 1px solid rgba(255, 60, 80, 0.3);
        }

        /* Progress Bar */
        .progress-bar-container {
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.04);
            margin-top: 10px;
            border-radius: 999px;
            overflow: hidden;
            display: none;
        }

        .progress-bar {
            height: 100%;
            border-radius: 999px;
            transition: width 0.4s ease, background-color 0.4s ease;
            position: relative;
        }

        .progress-bar.progress-upload {
            background: linear-gradient(90deg, #ff8c00, #ffb84d);
            box-shadow: 0 0 8px rgba(255, 160, 30, 0.4);
        }

        .progress-bar.progress-processing {
            background: linear-gradient(90deg, #0066ff, #00b8e0);
            box-shadow: 0 0 8px rgba(0, 180, 255, 0.4);
            animation: progressGlow 1.5s ease-in-out infinite;
        }

        .progress-bar.progress-done {
            background: linear-gradient(90deg, #00c853, #34e88a);
            box-shadow: 0 0 8px rgba(0, 230, 118, 0.4);
        }

        @keyframes progressGlow {
            0%, 100% { box-shadow: 0 0 8px rgba(0, 180, 255, 0.4); }
            50% { box-shadow: 0 0 16px rgba(0, 200, 255, 0.6); }
        }

        /* Log Details */
        .log-details {
            margin-top: 10px;
            font-size: 11px;
            color: var(--text-secondary);
            border: 1px solid rgba(0, 200, 255, 0.12);
            border-radius: 10px;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.15);
        }

        .log-details summary {
            cursor: pointer;
            user-select: none;
            color: var(--accent);
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 0.3px;
            transition: color 0.2s;
        }

        .log-details summary:hover {
            color: #60e0ff;
        }

        .log-list {
            margin: 8px 0 0 18px;
            padding: 0;
        }

        .log-list li {
            margin: 4px 0;
            line-height: 1.5;
            font-family: var(--font-mono);
            font-size: 11px;
            animation: fadeInLine 0.3s ease-out;
        }

        @keyframes fadeInLine {
            from { opacity: 0; transform: translateX(-8px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* ===== Empty State ===== */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--muted);
            font-family: var(--font-mono);
            font-size: 12px;
            letter-spacing: 0.5px;
            border: 1px dashed rgba(0, 200, 255, 0.12);
            border-radius: 12px;
        }

        /* ===== Scrollbar ===== */
        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 200, 255, 0.12);
            border-radius: 999px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 200, 255, 0.25);
        }

        /* ===== Responsive ===== */
        @media (max-width: 640px) {
            body { padding: 10px; }
            .container { padding: 20px; border-radius: 12px; }
            .upload-area { padding: 32px 20px; }
            .file-item { flex-direction: column; align-items: flex-start; gap: 10px; }
            .status-badge { align-self: flex-end; }
            .header { flex-wrap: wrap; }
            .header-actions { margin-left: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Header -->
    <div class="header">
        <div class="logo-icon">📄</div>
        <div class="header-text">
            <h1>知识库文件导入</h1>
            <span>支持 PDF / Markdown 文档上传与智能解析</span>
        </div>
        <div class="header-actions">
            <a href="../query_process/page/chat.html" class="btn-back" title="返回知识库对话">
                ← 返回对话
            </a>
        </div>
    </div>

    <!-- Upload Zone -->
    <div class="upload-area" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <div class="upload-icon">☁️</div>
        <div class="upload-text">点击或拖拽文件到此处</div>
        <div class="upload-hint">支持 PDF · Markdown (.pdf / .md)</div>
        <input type="file" id="fileInput" class="file-input" multiple accept=".pdf,.md">
    </div>

    <!-- File List -->
    <div class="section-title">上传任务</div>
    <div id="fileList" class="file-list">
        <div class="empty-state">暂无上传任务，拖拽文件到上方区域开始导入</div>
    </div>
</div>

<script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileList = document.getElementById('fileList');

    // 模拟后端API地址
    const API_BASE = 'http://127.0.0.1:8000';

    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('drag-over');
    });

    dropZone.addEventListener('dragleave', (e) => {
        e.preventDefault();
        dropZone.classList.remove('drag-over');
    });

    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('drag-over');
        handleFiles(e.dataTransfer.files);
    });

    fileInput.addEventListener('change', (e) => {
        handleFiles(e.target.files);
    });

    function handleFiles(files) {
        // Remove empty state if present
        const emptyEl = fileList.querySelector('.empty-state');
        if (emptyEl) emptyEl.remove();

        Array.from(files).forEach(uploadFile);
    }

    function updateProgressBar(bar, percentage, phase) {
        bar.style.width = percentage + '%';
        bar.className = 'progress-bar';
        if (phase === 'upload') {
            bar.classList.add('progress-upload');
        } else if (phase === 'processing') {
            bar.classList.add('progress-processing');
        } else if (phase === 'done') {
            bar.classList.add('progress-done');
        }
    }

    async function uploadFile(file) {
        const id = 'file-' + Math.random().toString(36).substr(2, 9);
        const html = `
            <div class="file-item" id="${id}">
                <div class="file-info">
                    <span class="file-name">${escapeHtml(file.name)}</span>
                    <span class="file-size">${(file.size / 1024).toFixed(2)} KB</span>
                    <div class="progress-bar-container">
                        <div class="progress-bar progress-upload"></div>
                    </div>
                    <details class="log-details">
                        <summary>任务日志（点击展开）</summary>
                        <ul class="log-list"></ul>
                    </details>
                </div>
                <div class="status-badge status-uploading">上传中...</div>
            </div>
        `;
        fileList.insertAdjacentHTML('afterbegin', html);
        const itemEl = document.getElementById(id);
        const statusBadge = itemEl.querySelector('.status-badge');
        const progressBar = itemEl.querySelector('.progress-bar');
        const progressContainer = itemEl.querySelector('.progress-bar-container');
        const logDetails = itemEl.querySelector('.log-details');
        const logSummary = itemEl.querySelector('.log-details summary');
        const logListEl = itemEl.querySelector('.log-list');

        const formData = new FormData();
        formData.append('files', file);

        try {
            // 1. Upload file
            progressContainer.style.display = 'block';
            updateProgressBar(progressBar, 50, 'upload');

            const response = await fetch(`${API_BASE}/upload`, {
                method: 'POST',
                body: formData
            });

            if (!response.ok) throw new Error('Upload failed');

            const result = await response.json();
            const taskId = result.task_ids[0];

            // Transition to processing
            updateProgressBar(progressBar, 30, 'processing');
            statusBadge.textContent = '处理中...';
            statusBadge.className = 'status-badge status-processing';
            itemEl.classList.add('status-processing');

            // 2. Poll status
            pollStatus(taskId, itemEl);

        } catch (error) {
            console.error(error);
            statusBadge.textContent = '失败';
            statusBadge.className = 'status-badge status-error';
            itemEl.classList.add('status-error');
            updateProgressBar(progressBar, 0, 'done');
        }
    }

    function escapeHtml(str) {
        return String(str)
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#039;');
    }

    function normalizeDoneLog(text) {
        if (typeof text !== 'string') return String(text);
        return text.endsWith('已完成') ? text : `${text}已完成`;
    }

    function normalizeRunningLog(text) {
        if (typeof text !== 'string') return String(text);
        if (text.startsWith('正在进行')) return text.endsWith('...') ? text : `${text}...`;
        return `正在进行${text}...`;
    }

    function renderLogs(itemEl, doneList, runningList) {
        const logSummary = itemEl.querySelector('.log-details summary');
        const logListEl = itemEl.querySelector('.log-list');
        const logDetails = itemEl.querySelector('.log-details');

        const done = Array.isArray(doneList) ? doneList : [];
        const running = Array.isArray(runningList) ? runningList : [];

        logSummary.textContent = `任务日志（已完成 ${done.length}，进行中 ${running.length}）`;

        logListEl.innerHTML = '';
        const lines = [
            ...done.map(normalizeDoneLog),
            ...running.map(normalizeRunningLog),
        ];

        if (lines.length === 0) {
            const li = document.createElement('li');
            li.textContent = '等待任务开始...';
            logListEl.appendChild(li);
        } else {
            for (const line of lines) {
                const li = document.createElement('li');
                li.textContent = line;
                logListEl.appendChild(li);
            }
        }

        if (lines.length === 0) {
            logDetails.open = false;
        }
    }

    function pollStatus(taskId, itemEl) {
        const statusBadge = itemEl.querySelector('.status-badge');
        const progressBar = itemEl.querySelector('.progress-bar');

        const interval = setInterval(async () => {
            try {
                const res = await fetch(`${API_BASE}/status/${taskId}`);
                const data = await res.json();

                renderLogs(itemEl, data.done_list, data.running_list);

                if (data.status === 'completed') {
                    statusBadge.textContent = '已完成';
                    statusBadge.className = 'status-badge status-completed';
                    itemEl.classList.add('status-completed');
                    itemEl.classList.remove('status-processing');
                    updateProgressBar(progressBar, 100, 'done');
                    clearInterval(interval);
                } else if (data.status === 'processing') {
                    statusBadge.textContent = '处理中...';
                    updateProgressBar(progressBar, 30, 'processing');
                } else if (data.status === 'failed') {
                    statusBadge.textContent = '失败';
                    statusBadge.className = 'status-badge status-error';
                    itemEl.classList.add('status-error');
                    itemEl.classList.remove('status-processing');
                    clearInterval(interval);
                }
            } catch (e) {
                console.error('Polling error', e);
            }
        }, 2000);
    }
</script>

</body>
</html>
